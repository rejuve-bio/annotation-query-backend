name: CD - Governance

on:
  workflow_run:
    workflows: ["CD - Progressive Delivery"]
    types: [completed]
  schedule:
    - cron: '0 8 * * 0'  # Every Sunday at 8am UTC
  workflow_dispatch:

jobs:
  # JOB 1: Policy-as-code — validate k8s manifests against OPA policies
  policy-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install conftest
      run: |
        wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.46.0/conftest_0.46.0_Linux_x86_64.tar.gz
        tar xzf conftest_0.46.0_Linux_x86_64.tar.gz
        sudo mv conftest /usr/local/bin/
        conftest --version

    - name: Write OPA policies
      run: |
        mkdir -p policy

        cat > policy/deployment.rego << 'EOF'
        package main

        # Deployments must define resource limits
        deny[msg] {
          input.kind == "Deployment"
          container := input.spec.template.spec.containers[_]
          not container.resources.limits
          msg := sprintf("Deployment '%s': container '%s' must define resource limits", [input.metadata.name, container.name])
        }

        # Deployments must have at least 1 replica
        deny[msg] {
          input.kind == "Deployment"
          input.spec.replicas == 0
          msg := sprintf("Deployment '%s' must have at least 1 replica", [input.metadata.name])
        }

        # Deployments must use imagePullPolicy: Always to ensure latest image is pulled
        deny[msg] {
          input.kind == "Deployment"
          container := input.spec.template.spec.containers[_]
          container.imagePullPolicy != "Always"
          msg := sprintf("Deployment '%s': container '%s' must use imagePullPolicy: Always", [input.metadata.name, container.name])
        }

        # Warn if no readiness probe defined
        warn[msg] {
          input.kind == "Deployment"
          container := input.spec.template.spec.containers[_]
          not container.readinessProbe
          msg := sprintf("Deployment '%s': container '%s' should define a readiness probe", [input.metadata.name, container.name])
        }

        # Warn if no liveness probe defined
        warn[msg] {
          input.kind == "Deployment"
          container := input.spec.template.spec.containers[_]
          not container.livenessProbe
          msg := sprintf("Deployment '%s': container '%s' should define a liveness probe", [input.metadata.name, container.name])
        }
        EOF

    - name: Run policy check on k8s manifests
      run: |
        echo "=== Running policy checks on k8s/staging/annotation/ ==="

        conftest test k8s/staging/annotation/ \
          --policy policy/ \
          --output json 2>/dev/null > policy-report.json

        echo "=== Policy Check Results ==="
        cat policy-report.json | jq -r '
          .[] |
          "File: \(.filename)",
          (.successes | if . > 0 then "  Passed: \(.)" else "" end),
          (.failures[]? | "  [DENY] \(.msg)"),
          (.warnings[]? | "  [WARN] \(.msg)")
        ' 2>/dev/null || cat policy-report.json

    - name: Upload policy report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: policy-report
        path: policy-report.json

  # JOB 2: SLO quality gate — check live app latency and error rate
  slo-quality-gate:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
    - name: Run SLO check against live deployment
      run: |
        BASE_URL="http://${{ secrets.STAGING_SERVER_IP }}:30501"
        echo "=== SLO Quality Gate — 10 requests to $BASE_URL ==="

        TOTAL_TIME=0
        FAILED=0
        RESULTS=""

        for i in {1..10}; do
          RESPONSE=$(curl -o /dev/null -s -w "%{http_code}:%{time_total}" \
            --max-time 5 "${BASE_URL}/health" 2>/dev/null || echo "000:5.000")

          HTTP_CODE=$(echo $RESPONSE | cut -d: -f1)
          TIME=$(echo $RESPONSE | cut -d: -f2)
          TOTAL_TIME=$(echo "$TOTAL_TIME + $TIME" | bc)

          if [[ "$HTTP_CODE" != "200" ]]; then
            FAILED=$((FAILED + 1))
            RESULTS="${RESULTS}\n  Request $i: HTTP $HTTP_CODE — ${TIME}s [FAIL]"
          else
            RESULTS="${RESULTS}\n  Request $i: HTTP $HTTP_CODE — ${TIME}s [PASS]"
          fi
        done

        AVG_TIME=$(echo "scale=3; $TOTAL_TIME / 10" | bc)
        ERROR_RATE=$((FAILED * 10))

        echo -e "$RESULTS"
        echo ""
        echo "=== SLO Results ==="
        echo "  Avg latency : ${AVG_TIME}s  (SLO threshold: 2.0s)"
        echo "  Error rate  : ${ERROR_RATE}%  (SLO threshold: 10%)"

        # SLO thresholds
        LATENCY_BREACHED=$(echo "$AVG_TIME > 2.0" | bc)

        if [[ "$LATENCY_BREACHED" == "1" ]]; then
          echo "[SLO BREACH] Avg latency ${AVG_TIME}s exceeds 2.0s threshold"
          exit 1
        fi

        if [[ "$FAILED" -ge "1" ]]; then
          echo "[SLO BREACH] Error rate ${ERROR_RATE}% exceeds 10% threshold"
          exit 1
        fi

        echo "[SUCCESS] All SLO thresholds met"

  # JOB 3: Compliance report — audit pipeline runs and generate report
  compliance-report:
    runs-on: ubuntu-latest

    steps:
    - name: Fetch recent pipeline runs
      run: |
        curl -s \
          -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=30" \
          > workflow_runs.json

    - name: Generate compliance report
      run: |
        REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
        TOTAL=$(cat workflow_runs.json | jq '.total_count')
        SUCCESS=$(cat workflow_runs.json | jq '[.workflow_runs[] | select(.conclusion=="success")] | length')
        FAILED=$(cat workflow_runs.json | jq '[.workflow_runs[] | select(.conclusion=="failure")] | length')
        CANCELLED=$(cat workflow_runs.json | jq '[.workflow_runs[] | select(.conclusion=="cancelled")] | length')

        cat > compliance-report.md << EOF
        # CI/CD Compliance Report
        **Generated:** ${REPORT_DATE}
        **Repository:** ${{ github.repository }}

        ---

        ## Pipeline Run Summary (last 30 runs)

        | Status | Count |
        |--------|-------|
        | Successful | ${SUCCESS} |
        | Failed | ${FAILED} |
        | Cancelled | ${CANCELLED} |
        | Total | ${TOTAL} |

        ## Recent Pipeline Runs

        $(cat workflow_runs.json | jq -r '
          .workflow_runs[] |
          "| \(.name) | \(.head_branch) | \(.conclusion // "in_progress") | \(.created_at) |"
        ' | head -20)

        ---
        *Generated by cd-governance.yml — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*
        EOF

        echo "=== Compliance Report ==="
        cat compliance-report.md

    - name: Upload compliance report
      uses: actions/upload-artifact@v4
      with:
        name: compliance-report-${{ github.run_number }}
        path: compliance-report.md

  # Notify on SLO breach
  notify-slo-breach:
    runs-on: ubuntu-latest
    needs: [slo-quality-gate]
    if: failure()

    steps:
    - name: Send SLO breach notification
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "SLO BREACH - Annotation Backend Staging"
        to: ${{ secrets.RECIEVER_EMAIL }}
        from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
        body: |
          SLO Quality Gate Failed!

          The live staging deployment is not meeting SLO thresholds.

          Thresholds:
          - Avg latency must be < 2.0s
          - Error rate must be < 10%

          Repository: ${{ github.repository }}
          View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
