Title: BioCypher graph schema configuration file (Biolink-adapted for all species)



##################             NODES   SECTION             ####################

3d genome structure:
  represented_as: node
  is_a: position entity
  mixins:
  - biolink:GenomicEntity
  biolink_category: biolink:GenomicEntity
  input_label: 3d_genome_structure
  inherit_properties: true
  description: A region of the genome that is associated with 3D genome structure
  properties:
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page

anatomy:
  is_a: ontology term
  represented_as: node
  input_label: anatomy
  mixins:
  - biolink:AnatomicalEntity
  biolink_category: biolink:AnatomicalEntity
  inherit_properties: true
  kgx_properties:
    category: biolink:AnatomicalEntity

biological process:
  is_a: ontology term
  mixins:
  - biolink:BiologicalProcess
  biolink_category: biolink:BiologicalProcess
  represented_as: node
  input_label: biological_process
  inherit_properties: true
  kgx_properties:
    category: biolink:BiologicalProcess

cell line:
  is_a: ontology term
  represented_as: node
  input_label: cell_line
  mixins:
  - biolink:CellLine
  biolink_category: biolink:CellLine
  inherit_properties: true
  kgx_properties:
    category: biolink:CellLine

cell type:
  is_a: ontology term
  represented_as: node
  input_label: cell_type
  mixins:
  - biolink:Cell
  biolink_category: biolink:Cell
  inherit_properties: true
  kgx_properties:
    category: biolink:Cell

cellular component:
  is_a: ontology term
  mixins:
  - biolink:CellularComponent
  biolink_category: biolink:CellularComponent
  represented_as: node
  input_label: cellular_component
  inherit_properties: true
  kgx_properties:
    category: biolink:CellularComponent

chromosome chain:
  represented_as: node
  is_a: position entity
  mixins:
  - biolink:GenomicEntity
  biolink_category: biolink:GenomicEntity
  inherit_properties: true
  input_label: chromosome_chain
  properties:
    chain_id:
      type: str
      biolink: id
    next_start:
      type: int
    resolution:
      type: str

coding element:
  represented_as: node
  is_a: biological entity
  mixins:
  - biolink:GenomicEntity
  - biolink:BiologicalEntity
  biolink_category: biolink:GenomicEntity
  input_label: coding_element
  description: A region of a gene that codes for a protein or peptide
  properties:
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page
    taxon_id:
      description: Taxon ID for the organism (e.g., 7227 for fruit fly, 9606 for human)
      type: int
      biolink: taxon
      range: biolink:OrganismTaxon

developmental stage:
  is_a: ontology term
  represented_as: node
  input_label: developmental_stage
  mixins:
  - biolink:LifeStage
  biolink_category: biolink:LifeStage
  inherit_properties: true
  kgx_properties:
    category: biolink:LifeStage

disease:
  is_a: ontology term
  represented_as: node
  input_label: disease
  mixins:
  - biolink:Disease
  biolink_category: biolink:Disease
  inherit_properties: true
  kgx_properties:
    category: biolink:Disease

epigenomic feature:
  represented_as: node
  is_a: position entity
  mixins:
  - biolink:EpigenomicEntity
  biolink_category: biolink:EpigenomicEntity
  inherit_properties: true
  input_label: epigenomic_feature
  description: A region of the genome that is associated with epigenetic modifications
  properties:
    biological_context:
      type: str
      biolink: has_biological_sequence
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page

exon:
  represented_as: node
  preferred_id: ensemble
  input_label: exon
  is_a:
  - coding element
  - position entity
  mixins:
  - biolink:Exon
  biolink_category: biolink:Exon
  inherit_properties: true
  kgx_properties:
    category: biolink:Exon
  properties:
    exon_number:
      type: int

experimental factor:
  is_a: ontology term
  represented_as: node
  input_label: experimental_factor
  mixins:
  - biolink:OntologyClass
  biolink_category: biolink:OntologyClass
  inherit_properties: true
  kgx_properties:
    category: biolink:OntologyClass

gene:
  represented_as: node
  preferred_id: ensemble
  input_label: gene
  is_a:
  - coding element
  - position entity
  mixins:
  - biolink:Gene
  inherit_properties: true
  properties:
    gene_name:
      type: str
      biolink: name
    gene_type:
      type: str
    synonym:
      type: str[]
      biolink: synonym
  kgx_properties:
    category: biolink:Gene

genomic variant:
  represented_as: node
  is_a: position entity
  mixins:
  - biolink:SequenceVariant
  biolink_category: biolink:SequenceVariant
  inherit_properties: true
  input_label: genomic_variant
  description: A genomic variant is a change in one or more sequence of a genome
  properties:
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page

molecular function:
  is_a: ontology term
  mixins:
  - biolink:MolecularActivity
  biolink_category: biolink:MolecularActivity
  represented_as: node
  input_label: molecular_function
  inherit_properties: true
  kgx_properties:
    category: biolink:MolecularActivity

molecular interaction:
  is_a: ontology term
  represented_as: node
  input_label: molecular_interaction
  mixins:
  - biolink:OntologyClass
  biolink_category: biolink:OntologyClass
  inherit_properties: true
  kgx_properties:
    category: biolink:OntologyClass

motif:
  represented_as: node
  is_a: epigenomic feature
  mixins:
  - biolink:TranscriptionFactorBindingSite
  biolink_category: biolink:TranscriptionFactorBindingSite
  input_label: motif
  inherit_properties: true
  accessible_via:
    name: motifs
    description: TF binding motifs.
    fuzzy_text_search: tf_name
    return: _id, tf_name, source, source_url, pwm, length
  kgx_properties:
    category: biolink:TranscriptionFactorBindingSite
  properties:
    tf_name:
      type: str
      biolink: name
    pwm_A:
      type: float[]
    pwm_C:
      type: float[]
    pwm_G:
      type: float[]
    pwm_T:
      type: float[]
    length:
      type: int

non coding element:
  represented_as: node
  is_a: position entity
  mixins:
  - biolink:RNAProduct
  biolink_category: biolink:RNAProduct
  inherit_properties: true
  input_label: non_coding_element
  description: A region of a gene that does not code for a protein or peptide
  properties:
    biological_context:
      type: str
      biolink: has_biological_sequence
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page

non coding rna:
  represented_as: node
  input_label: non_coding_rna
  is_a: non coding element
  mixins:
  - biolink:RNAProduct
  biolink_category: biolink:RNAProduct
  inherit_properties: true
  properties:
    rna_type:
      type: str
    taxon_id:
      description: Taxon ID for the organism (e.g., 7227 for fruit fly, 9606 for human)
      type: int
      biolink: taxon
      range: biolink:OrganismTaxon
  kgx_properties:
    category: biolink:RNAProduct

ontology term:
  is_a: ontology class
  mixins:
  - biolink:OntologyClass
  biolink_category: biolink:OntologyClass
  represented_as: node
  input_label: ontology term
  properties:
    id:
      type: str
      biolink: id
    term_name:
      type: str
      biolink: name
    description:
      type: str
      biolink: description
    synonym:
      type: str[]
      biolink: synonym
    alternative_ids:
      type: str[]
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page

pathway:
  is_a: biological process
  exact_mappings:
  - PW:0000001
  - WIKIDATA:Q4915012
  narrow_mappings:
  - SIO:010526
  - GO:0007165
  represented_as: node
  input_label: pathway
  mixins:
  - biolink:Pathway
  biolink_category: biolink:Pathway
  properties:
    pathway_name:
      type: str
      biolink: name
    pathway_url:
      type: str
      biolink: source_record_urls
    evidence:
      type: str
      biolink: has_evidence
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page
    taxon_id:
      description: Taxon ID for the organism (e.g., 7227 for fruit fly, 9606 for human)
      type: str
      biolink: taxon
      range: biolink:OrganismTaxon
  kgx_properties:
    category: biolink:Pathway

phenotype:
  is_a: ontology term
  represented_as: node
  input_label: phenotype
  mixins:
  - biolink:OntologyClass
  biolink_category: biolink:OntologyClass
  inherit_properties: true
  kgx_properties:
    category: biolink:OntologyClass

position entity:
  represented_as: node
  is_a: biological entity
  mixins:
  - biolink:GenomicEntity
  - biolink:BiologicalEntity
  biolink_category: biolink:GenomicEntity
  input_label: position_entity
  description: A biological entity that is defined by its position in the genome
  properties:
    chr:
      type: str
    start:
      type: int
      biolink: start_interbase_coordinate
    end:
      type: int
      biolink: end_interbase_coordinate
    taxon_id:
      description: Taxon ID for the organism (e.g., 7227 for fruit fly, 9606 for human)
      type: int
      biolink: taxon
      range: biolink:OrganismTaxon

promoter:
  represented_as: node
  input_label: promoter
  is_a: non coding element
  mixins:
  - biolink:RegulatoryRegion
  biolink_category: biolink:RegulatoryRegion
  inherit_properties: true
  kgx_properties:
    category: biolink:RegulatoryRegion

protein:
  represented_as: node
  preferred_id: uniprot
  input_label: protein
  is_a: coding element
  mixins:
  - biolink:Protein
  biolink_category: biolink:Protein
  inherit_properties: true
  properties:
    accessions:
      type: str[]
      biolink: xref
    protein_name:
      type: str
      biolink: name
    is_canonical:
      type: bool
    is_isoform:
      type: bool
    canonical_accession:
      type: str
    isoform_name:
      type: str
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page
  kgx_properties:
    category: biolink:Protein

reaction:
  is_a: molecular function
  narrow_mappings:
  - GO:0003674
  represented_as: node
  input_label: reaction
  mixins:
  - biolink:MolecularActivity
  biolink_category: biolink:MolecularActivity
  properties:
    reaction_name:
      type: str
      biolink: name
    reaction_url:
      type: str
      biolink: source_record_urls
    evidence:
      type: str
      biolink: has_evidence
    pubmed_url:
      type: str
      biolink: source_record_urls
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page
    taxon_id:
      description: Taxon ID for the organism (e.g., 7227 for fruit fly, 9606 for human)
      type: str
      biolink: taxon
      range: biolink:OrganismTaxon
  kgx_properties:
    category: biolink:MolecularActivity

regulatory region:
  represented_as: node
  input_label: regulatory_region
  is_a: non coding element
  mixins:
  - biolink:RegulatoryRegion
  biolink_category: biolink:RegulatoryRegion
  inherit_properties: true
  description: A region of the genome that is involved in gene regulation.
  kgx_properties:
    category: biolink:RegulatoryRegion
  properties:
    cell:
      type: str
    biochemical_activity:
      type: str
      biolink: has_biological_sequence
    biological_context:
      type: str
      biolink: has_gene_or_gene_product

sequence type:
  is_a: ontology term
  represented_as: node
  input_label: sequence_type
  mixins:
  - biolink:OntologyClass
  biolink_category: biolink:OntologyClass
  inherit_properties: true
  kgx_properties:
    category: biolink:OntologyClass

sequence variant:
  represented_as: node
  input_label: sequence_variant
  is_a: genomic variant
  mixins:
  - biolink:SequenceVariant
  biolink_category: biolink:SequenceVariant
  inherit_properties: true
  kgx_properties:
    category: biolink:SequenceVariant
  description: A change in the nucleotide sequence of a genome compared to a reference
    sequence.
  properties:
    rsid:
      type: str
      biolink: id
    ref:
      type: str
    alt:
      type: str
    raw_cadd_score:
      type: float
    phred_score:
      type: float

small molecule:
  is_a: ontology term
  represented_as: node
  input_label: small_molecule
  mixins:
  - biolink:ChemicalEntity
  biolink_category: biolink:ChemicalEntity
  inherit_properties: true
  kgx_properties:
    category: biolink:ChemicalEntity

structural variant:
  represented_as: node
  input_label: structural_variant
  is_a: genomic variant
  mixins:
  - biolink:SequenceVariant
  biolink_category: biolink:SequenceVariant
  description: A structural variant is a larger scale genomic alteration that affects
    the structure of chromosomes, such as deletions, duplications, inversions, and
    translocations.
  inherit_properties: true
  kgx_properties:
    category: biolink:SequenceVariant
  properties:
    variant_accession:
      type: str
      biolink: id
    variant_type:
      type: str
    evidence:
      type: str
      biolink: has_evidence

tad:
  represented_as: node
  input_label: tad
  is_a: 3d genome structure
  mixins:
  - biolink:GenomicEntity
  biolink_category: biolink:GenomicEntity
  inherit_properties: true
  kgx_properties:
    category: biolink:GenomicEntity

tissue:
  is_a: ontology term
  mixins:
  - biolink:AnatomicalEntity
  biolink_category: biolink:AnatomicalEntity
  represented_as: node
  input_label: tissue
  inherit_properties: true
  kgx_properties:
    category: biolink:AnatomicalEntity

transcript:
  represented_as: node
  input_label: transcript
  is_a:
  - coding element
  - position entity
  mixins:
  - biolink:Transcript
  biolink_category: biolink:Transcript
  inherit_properties: true
  kgx_properties:
    category: biolink:Transcript
  properties:
    transcript_name:
      type: str
      biolink: name
    transcript_id:
      type: str
      biolink: id
    transcript_type:
      type: str
  description: An RNA synthesized on a DNA or RNA template by an RNA polymerase.
  exact_mappings:
  - SO:0000673
  - SIO:010450
  - WIKIDATA:Q7243183
  - dcid:RNATranscript
  in_subset:
  - model_organism_database

transcription binding site:
  represented_as: node
  input_label: tfbs
  is_a: position entity
  mixins:
  - biolink:RegulatoryRegion
  biolink_category: biolink:RegulatoryRegion
  inherit_properties: true
  description: A region of DNA where a transcription factor binds to regulate gene
    expression
  kgx_properties:
    category: biolink:RegulatoryRegion



##################             EDGES   SECTION             ####################

annotation:
  is_a: related to at concept level
  mixins:
  - biolink:Association
  biolink_predicate: biolink:related_to
  represented_as: edge
  input_label: annotation
  kgx_properties:
    subject_category: biolink:OntologyClass
    object_category: biolink:NamedThing
    knowledge_level: knowledge_assertion
    agent_type: manual_agent
  description: An association between a gene/ontology term and another entity
  properties:
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page

association:
  description: A typed association between two entities that represents some form
    of  relationship or connection in a biomedical context.
  abstract: true
  represented_as: edge
  properties:
    source:
      type: str
      biolink: knowledge_source
    source_url:
      type: str
      biolink: source_web_page
    knowledge_level:
      type: str
      const: knowledge_assertion
    agent_type:
      type: str
      const: manual_agent
  kgx_properties:
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

biological process gene:
  is_a: go gene
  biolink_predicate: biolink:involved_in
  inherit_properties: true
  represented_as: edge
  input_label: biological_process_gene
  output_label: involved_in
  source: gene
  target: biological process
  gx_properties:
    subject_category: biolink:Gene
    object_category: biolink:BiologicalProcess
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

biological process gene product:
  is_a: go gene product
  biolink_predicate: biolink:involved_in
  inherit_properties: true
  represented_as: edge
  input_label: biological_process_gene_product
  output_label: involved_in
  source: protein
  target: biological process
  kgx_properties:
    subject_category: biolink:Protein
    object_category: biolink:BiologicalProcess
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

biological process rna:
  is_a: annotation
  mixins:
  - biolink:annotation
  biolink_predicate: biolink:participates_in
  inherit_properties: true
  represented_as: edge
  input_label: biological_process_rna
  output_label: participates_in
  source: non coding rna
  target: biological process
  kgx_properties:
    subject_category: biolink:RNAProduct
    object_category: biolink:BiologicalProcess
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

biological process subclass:
  is_a: subclass of
  biolink_predicate: biolink:subclass_of
  inherit_properties: true
  represented_as: edge
  input_label: biological_process_subclass_of
  output_label: is_a
  source: biological process
  target: biological process
  kgx_properties:
    subject_category: biolink:BiologicalProcess
    object_category: biolink:BiologicalProcess
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

bto subclass of:
  is_a: subclass of
  mixins:
  - biolink:AnatomicalEntityToAnatomicalEntityAssociation
  biolink_predicate: biolink:subclass_of
  inherit_properties: true
  represented_as: edge
  input_label: bto_subclass_of
  output_label: is_a
  source: tissue
  target: tissue
  kgx_properties:
    subject_category: biolink:AnatomicalEntity
    object_category: biolink:AnatomicalEntity
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

catalyst protein to reaction or pathway association:
  is_a: annotation
  biolink_predicate: biolink:regulates
  inherit_properties: true
  description: holds between a protein playing an input role in a reaction and a pathway
  represented_as: edge
  input_label: regulates
  source: protein
  target: biolink:BiologicalProcessOrActivity
  properties:
    relation_ontology_term: str
  kgx_properties:
    subject_category: biolink:Protein
    object_category: biolink:MolecularActivity
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cell line is a cell type:
  is_a: subclass of
  biolink_predicate: biolink:subclass_of
  inherit_properties: true
  represented_as: edge
  input_label: cell_line_is_a_cell_type
  output_label: is_a
  kgx_properties:
    subject_category: biolink:CellLine
    object_category: biolink:Cell
    knowledge_level: knowledge_assertion
    agent_type: manual_agent
  description: Cross-ontology relation linking a Cell Line Ontology (CLO) term to
    a Cell Ontology (CL) term.
  source: cell line
  target: cell type

cell type part of tissue:
  is_a: part of
  biolink_predicate: biolink:part_of
  inherit_properties: true
  represented_as: edge
  input_label: cell_type_part_of_tissue
  output_label: part_of
  kgx_properties:
    subject_category: biolink:Cell
    object_category: biolink:AnatomicalEntity
    knowledge_level: knowledge_assertion
    agent_type: manual_agent
  description: Cross-ontology relation linking a CL cell type to a BTO tissue term.
  source: cell type
  target: tissue

cellular component gene:
  is_a: go gene
  biolink_predicate: biolink:CellularComponent
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_gene
  source: gene
  target: cellular component
  kgx_properties:
    subject_category: biolink:Gene
    object_category: biolink:CellularComponent
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cellular component gene located in:
  is_a: cellular component gene
  biolink_predicate: biolink:located_in
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_gene_located_in
  output_label: located_in
  source: gene
  target: cellular component
  kgx_properties:
    subject_category: biolink:Gene
    object_category: biolink:CellularComponent
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cellular component gene part of:
  is_a: cellular component gene
  biolink_predicate: biolink:part_of
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_gene_part_of
  output_label: part_of
  source: gene
  target: cellular component
  kgx_properties:
    subject_category: biolink:Gene
    object_category: biolink:CellularComponent
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cellular component gene product:
  is_a: go gene product
  biolink_predicate: biolink:located_in
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_gene_product
  source: protein
  target: cellular component
  kgx_properties:
    subject_category: biolink:Protein
    object_category: biolink:CellularComponent
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cellular component gene product located in:
  is_a: cellular component gene product
  biolink_predicate: biolink:located_in
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_gene_product_located_in
  output_label: located_in
  source: protein
  target: cellular component
  kgx_properties:
    subject_category: biolink:Protein
    object_category: biolink:CellularComponent
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cellular component gene product part of:
  is_a: cellular component gene product
  biolink_predicate: biolink:part_of
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_gene_product_part_of
  output_label: part_of
  source: protein
  target: cellular component
  kgx_properties:
    subject_category: biolink:Protein
    object_category: biolink:CellularComponent
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cellular component rna:
  is_a: annotation
  mixins:
  - biolink:annotation
  biolink_predicate: biolink:located_in
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_rna
  output_label: located_in
  source: non coding rna
  target: cellular component
  kgx_properties:
    subject_category: biolink:RNAProduct
    object_category: biolink:CellularComponent
    knowledge_level: knowledge_assertion
    agent_type: manual_agent

cellular component subclass:
  is_a: subclass of
  biolink_predicate: biolink:subclass_of
  inherit_properties: true
  represented_as: edge
  input_label: cellular_component_subclass_of
  output_label: is_a
  source: cellular component
  target: cellular component
