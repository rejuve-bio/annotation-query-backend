name: GOA
description: Gene Ontology Annotations
website: http://geneontology.org/
nodes:
  go:
    represented_as: node
    input_label: go
    inherit_properties: true
    properties:
      subontology: str

relationships:
  biological process gene product:
    url: http://geneontology.org/gene-associations/goa_human.gaf.gz
    description: Association between proteins and biological processes
    input_label: biological_process_gene_product
    output_label: involved_in
    source: protein
    target: biological_process
    properties:
      qualifier: obj
      db_reference: obj
      evidence: str

  molucular function gene product:
    url: http://geneontology.org/gene-associations/goa_human.gaf.gz
    description: Association between proteins and molecular functions
    input_label: molecular_function_gene_product
    output_label: enables
    source: protein
    target: molecular_function
    properties:
      qualifier: obj
      db_reference: obj
      evidence: str

  cellular component gene product part of:
    url: http://geneontology.org/gene-associations/goa_human.gaf.gz
    description: Part-of relationship between proteins and cellular components
    input_label: cellular_component_gene_product_part_of
    output_label: part_of
    source: protein
    target: cellular_component
    properties:
      qualifier: obj
      db_reference: obj
      evidence: str

  cellular component gene product located in:
    url: http://geneontology.org/gene-associations/goa_human.gaf.gz
    description: Location relationship between proteins and cellular components
    input_label: cellular_component_gene_product_located_in
    output_label: located_in
    source: protein
    target: cellular_component
    properties:
      qualifier: obj
      db_reference: obj
      evidence: str

  cl capable of:
    is_a: annotation
    inherit_properties: true
    represented_as: edge
    input_label: cl_capable_of
    output_label: capable_of
    description: >-
      Represents a functional capability relationship between a CL term and a GO term.
    source: cl
    target: go
  go subclass of:
    is_a: subclass of
    inherit_properties: true
    represented_as: edge
    input_label: go_subclass_of
    output_label: subclass_of
    source: go
    target: go
  go gene product:
    is_a: annotation
    inherit_properties: true
    represented_as: edge
    input_label: go_gene_product
    source: go
    target: protein
    properties:
      qualifier: obj
      db_reference: obj
      evidence: str
  go gene:
    is_a: annotation
    inherit_properties: true
    represented_as: edge
    input_label: go_gene
    output_label: belongs_to
    source: gene
    target: go
    properties:
      qualifier: obj
      db_reference: obj
      evidence: str
  go rna:
    is_a: annotation
    inherit_properties: true
    represented_as: edge
    input_label: go_rna
    output_label: belongs_to
    source: non_coding_rna
    target: go