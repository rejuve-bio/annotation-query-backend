apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-staging
  namespace: annotation-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-staging
  template:
    metadata:
      labels:
        app: redis-staging
    spec:
      containers:
        - name: redis-staging
          image: redis:latest
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: annotation-staging
spec:
  selector:
    app: redis-staging
  ports:
    - port: 6379
      targetPort: 6379
